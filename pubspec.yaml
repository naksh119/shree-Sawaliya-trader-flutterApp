name: sawaliyatrader
description: Loan operations platform for Shree Sawaliya Multitrade Pvt. Ltd.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  cookie_jar: ^4.0.8
  dio: ^5.8.0+1
  dio_cookie_manager: ^3.1.1
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.5
  google_fonts: ^6.2.1
  flutter_dotenv: ^6.0.1
  go_router: ^16.0.0
  fl_chart: 1.0.0
  intl: ^0.20.2
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/logo.png
    - assets/splash_background.png
    - assets/feather_loader.png
