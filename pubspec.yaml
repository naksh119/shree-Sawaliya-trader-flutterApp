name: sawaliyatrader
description: Loan operations platform for SSM Nexus.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  cookie_jar: ^4.0.8
  dio: ^5.8.0+1
  dio_cookie_manager: ^3.1.1
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.5
  flutter_dotenv: ^6.0.1
  go_router: ^16.0.0
  fl_chart: 1.0.0
  intl: ^0.20.2
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  adaptive_icon_background: '#FDFBF6'
  adaptive_icon_foreground: assets/app_icon.png
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/app_icon.png
    background_color: '#FDFBF6'
    theme_color: '#D4A62A'
  windows:
    generate: true
    image_path: assets/app_icon.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/app_icon.png

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/feather_loader.png
    - assets/app_icon.png
  fonts:
    - family: TimesNewRoman
      fonts:
        - asset: assets/times-new-roman/times.ttf
